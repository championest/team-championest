<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster Dojo — รีวิว</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { font-family: 'Inter', sans-serif; }
  body { background:#0b0e14; }
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a1f2e;border:1px solid;border-radius:12px;padding:10px 16px;color:#fff;font-size:13px;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:#2a3142;border-radius:4px}
</style>
</head>
<body class="text-gray-200">

<!-- LOGIN GATE -->
<div id="gate" class="fixed inset-0 flex items-center justify-center z-50 px-4" style="background:radial-gradient(circle at 50% 30%,#141a2e,#0b0e14)">
  <div class="text-center max-w-sm w-full">
    <div class="text-5xl mb-3">🥋</div>
    <h1 class="text-2xl font-bold text-white">Poster Dojo</h1>
    <p class="text-sm text-gray-400 mt-1 mb-6">รีวิว + สอน reviewer · เฉพาะแอดมิน</p>
    <button id="signin" class="w-full bg-white text-gray-800 font-semibold rounded-xl py-3 flex items-center justify-center gap-2 hover:opacity-90">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/></svg>
      เข้าสู่ระบบด้วย Google
    </button>
    <p id="gate-msg" class="text-xs text-rose-400 mt-4 hidden"></p>
    <p class="text-[10px] text-gray-600 mt-6">login ด้วยเมลแอดมิน (เช่น @gmail ที่ได้รับสิทธิ์)</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden max-w-3xl mx-auto px-3 py-4">
  <header class="flex items-center justify-between mb-3 sticky top-0 bg-[#0b0e14]/95 backdrop-blur py-2 z-30">
    <div>
      <h1 class="text-lg font-bold text-white flex items-center gap-2">🥋 Poster Dojo <span class="text-xs font-normal text-gray-500">รีวิว</span></h1>
      <p class="text-[11px] text-gray-500">คอมเมนต์ = กฎใหม่ใน RUBRIC · reviewer ฉลาดขึ้น</p>
    </div>
    <div class="text-right">
      <div id="me" class="text-[11px] text-gray-400"></div>
      <button id="signout" class="text-[11px] text-gray-500 hover:text-gray-300 underline">ออกจากระบบ</button>
    </div>
  </header>

  <div class="flex items-center gap-1.5 text-[11px] mb-3" id="filter">
    <button data-f="pending" class="fbtn px-3 py-1.5 rounded-full bg-amber-500 text-gray-900 font-semibold">รอรีวิว <span id="cnt-pending"></span></button>
    <button data-f="revise" class="fbtn px-3 py-1.5 rounded-full bg-gray-800 text-gray-400">ให้แก้</button>
    <button data-f="approved" class="fbtn px-3 py-1.5 rounded-full bg-gray-800 text-gray-400">ผ่าน</button>
    <button data-f="all" class="fbtn px-3 py-1.5 rounded-full bg-gray-800 text-gray-400">ทั้งหมด</button>
    <span class="ml-auto text-[11px] text-gray-600" id="rubric-stat"></span>
  </div>

  <div id="grid" class="space-y-3"><div class="text-gray-600 text-sm">Loading…</div></div>
  <div class="text-center text-gray-700 text-[11px] py-6">Up Level · Poster Dojo review console</div>
</div>

<div id="toast-wrap"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, query, orderBy, limit, onSnapshot, updateDoc, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAKxWv3FI7HrdrRlnJhsQbJ-97Pb_sdiOQ",
  authDomain: "up-level-guild.firebaseapp.com",
  projectId: "up-level-guild",
  storageBucket: "up-level-guild.firebasestorage.app",
  messagingSenderId: "721710985300",
  appId: "1:721710985300:web:c51e13963373a6feadbdc1"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// reviewer allowlist (guild admins)
const REVIEWERS = new Set([
  'champ.championest@gmail.com', 'namenrw@gmail.com', 'chawanut.cha@gmail.com',
  'boomboom08755@gmail.com', 'nuslove2560@gmail.com', 'phooreephat.k@gmail.com',
]);

const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ago = ts => { if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); const s=Math.floor((Date.now()-d)/1000); if(s<60)return s+'s'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; };
const toast = (m,c='#34d399') => { const t=document.createElement('div'); t.className='toast'; t.style.borderColor=c; t.textContent=m; document.getElementById('toast-wrap').appendChild(t); setTimeout(()=>t.remove(),3000); };

let ME = null, DOCS = [], FILTER = 'pending', pendingRender = false;
const drafts = {};
const typing = () => { const a=document.activeElement; return a && a.tagName==='TEXTAREA' && a.id?.startsWith('dc-'); };
window.draft = (id,v) => { drafts[id]=v; };

// ── auth ──
document.getElementById('signin').onclick = async () => {
  const p = new GoogleAuthProvider(); p.setCustomParameters({ prompt:'select_account' });
  try { await signInWithPopup(auth, p); }
  catch(e){ if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){ try{await signInWithRedirect(auth,p);}catch(_){}}
    else if(e.code==='auth/unauthorized-domain'){ gateMsg('โดเมนนี้ยังไม่อนุญาตใน Firebase Auth — แจ้ง Champ เพิ่ม championest.github.io'); }
    else if(e.code!=='auth/popup-closed-by-user'&&e.code!=='auth/cancelled-popup-request'){ gateMsg('login ไม่สำเร็จ: '+(e.code||'error')); } }
};
document.getElementById('signout').onclick = () => signOut(auth);
getRedirectResult(auth).catch(()=>{});
function gateMsg(m){ const e=document.getElementById('gate-msg'); e.textContent=m; e.classList.remove('hidden'); }

onAuthStateChanged(auth, user => {
  if (user && REVIEWERS.has((user.email||'').toLowerCase())) {
    ME = user.email;
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('me').textContent = '🟢 ' + user.email;
    start();
  } else if (user) {
    gateMsg('เมล ' + user.email + ' ไม่มีสิทธิ์รีวิว — ติดต่อ Champ');
    setTimeout(()=>signOut(auth), 100);
  } else {
    document.getElementById('app').classList.add('hidden');
    document.getElementById('gate').classList.remove('hidden');
  }
});

// ── data ──
let started = false;
function start(){
  if (started) return; started = true;
  document.querySelectorAll('.fbtn').forEach(b => b.onclick = () => {
    FILTER = b.dataset.f;
    document.querySelectorAll('.fbtn').forEach(x=>x.className='fbtn px-3 py-1.5 rounded-full bg-gray-800 text-gray-400');
    b.className='fbtn px-3 py-1.5 rounded-full bg-amber-500 text-gray-900 font-semibold';
    render();
  });
  document.getElementById('grid').addEventListener('focusout', () => { if(pendingRender) setTimeout(()=>{ if(!typing()) render(); }, 150); });

  onSnapshot(query(collection(db,'poster-dojo'), orderBy('created_at','desc'), limit(200)), snap => {
    DOCS = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    const pc = DOCS.filter(p => (p.status||'pending')==='pending').length;
    document.getElementById('cnt-pending').textContent = pc ? `(${pc})` : '';
    if (typing()) { pendingRender = true; } else render();
  }, e => { document.getElementById('grid').innerHTML = `<div class="text-rose-400 text-sm">โหลดไม่ได้: ${esc(e.code||e.message)}</div>`; });

  onSnapshot(collection(db,'poster-rubric'), snap => {
    const nw = snap.docs.filter(d=>!d.data().applied).length;
    document.getElementById('rubric-stat').textContent = `📖 ${snap.size} กฎ · ${nw} รอ sync`;
  });
}

function render(){
  pendingRender = false;
  const grid = document.getElementById('grid');
  let docs = DOCS;
  if (FILTER !== 'all') docs = docs.filter(p => (p.status||'pending')===FILTER);
  // sort by latest activity (updated_at) so a reworked poster bubbles to the top of the queue, not its old created_at slot
  const ms = p => (p.updated_at?.toMillis?.() ?? p.created_at?.toMillis?.() ?? 0);
  docs = docs.slice().sort((a,b) => ms(b) - ms(a));
  if (!docs.length) { grid.innerHTML = `<div class="text-gray-600 text-sm py-8 text-center">ไม่มีโพสในหมวด "${FILTER}" 🎉</div>`; return; }
  const vC = v => ({PASS:'emerald',REVISE:'amber',REJECT:'rose'}[v]||'gray');
  const stC = { pending:'amber', approved:'emerald', revise:'sky', reworking:'violet' };
  const stLabel = (st,p) => st==='reworking' ? `🔧 กำลังแก้${p.rework_round?' รอบ '+p.rework_round:''}` : st;

  grid.innerHTML = docs.map(p => {
    const id=p.id, vc=vC(p.verdict), st=p.status||'pending', done=st!=='pending';
    const reworked = st==='pending' && p.rework_round>0;
    const reworkBanner = reworked ? `<div class="text-[11px] text-violet-100 bg-violet-900/50 border border-violet-600/50 rounded-lg px-2 py-1.5">🔧 agent แก้มาแล้ว (รอบ ${p.rework_round}) — ช่วยตรวจรอบใหม่</div>` : '';
    const fails=(p.fails||[]).map(f=>`<div class="text-[11px] text-gray-400 flex gap-1.5 items-start"><span>${f.severity||'🟡'}</span><span class="text-gray-500 shrink-0">[${esc(f.id||'')}]</span><span>${esc(f.what||'')}</span></div>`).join('');
    const img=p.imageUrl?`<img src="${esc(p.imageUrl)}" loading="lazy" class="w-full rounded-xl bg-gray-800">`:`<div class="aspect-square rounded-xl bg-gray-800 grid place-items-center text-gray-600 text-xs">no image</div>`;
    const champ=p.champ_comment?`<div class="text-[11px] text-indigo-300 bg-indigo-950/40 rounded-lg px-2 py-1.5">💬 ${esc(p.champ_comment)} ${p.reviewed_by?`<span class="text-gray-500">— ${esc(p.reviewed_by.split('@')[0])}</span>`:''}</div>`:'';
    return `<div class="bg-gray-900/60 border border-gray-800/60 rounded-2xl p-3 grid sm:grid-cols-[200px_1fr] gap-3">
      <div>${img}</div>
      <div class="space-y-2 min-w-0">
        <div class="flex items-center justify-between gap-2">
          <div class="min-w-0"><div class="text-sm font-semibold text-gray-100 truncate">${esc(p.name||'untitled')}</div>
          <div class="text-[10px] text-gray-500">${esc([p.game,p.variant,p.created_at?ago(p.created_at)+' ago':''].filter(Boolean).join(' · '))}</div></div>
          <div class="text-right shrink-0"><span class="text-[10px] px-1.5 py-0.5 rounded bg-${vc}-900/50 text-${vc}-300">${esc(p.verdict||'?')}</span>
          <span class="text-[10px] px-1.5 py-0.5 rounded bg-${stC[st]||'gray'}-900/40 text-${stC[st]||'gray'}-300 ml-1${st==='reworking'?' animate-pulse':''}">${esc(stLabel(st,p))}</span>
          <div class="text-xs text-gray-400">${p.grade??'-'}/100</div></div>
        </div>
        ${reworkBanner}
        ${fails?`<div class="space-y-1 border-t border-gray-800/60 pt-2">${fails}</div>`:''}
        ${champ}
        ${done?'':`<div class="space-y-2 border-t border-gray-800/60 pt-2">
          <textarea id="dc-${id}" rows="2" oninput="draft('${id}',this.value)" placeholder="คอมเมนต์ (จะเป็นกฎใน RUBRIC ถ้าติ๊ก)" class="w-full bg-gray-800/70 border border-gray-700/50 rounded-lg px-2.5 py-2 text-xs text-gray-200 placeholder-gray-600 resize-none focus:outline-none focus:border-indigo-500/60">${esc(drafts[id]||'')}</textarea>
          <label class="flex items-center gap-2 text-[11px] text-gray-400 cursor-pointer"><input type="checkbox" id="dr-${id}" class="accent-indigo-500"> เพิ่มเป็นกฎใน RUBRIC
            <select id="ds-${id}" class="ml-auto bg-gray-800 border border-gray-700/50 rounded px-1 py-0.5 text-[11px]"><option value="🟡">🟡 major</option><option value="🔴">🔴 critical</option><option value="🟢">🟢 minor</option></select></label>
          <div class="flex gap-2">
            <button onclick="submit('${id}','approved')" class="flex-1 bg-emerald-600/80 hover:bg-emerald-600 text-white text-xs font-medium rounded-lg py-2">✅ ผ่าน</button>
            <button onclick="submit('${id}','revise')" class="flex-1 bg-amber-600/80 hover:bg-amber-600 text-white text-xs font-medium rounded-lg py-2">🔁 ให้แก้</button>
          </div></div>`}
      </div></div>`;
  }).join('');
}

window.submit = async (id, status) => {
  const comment=(document.getElementById('dc-'+id)?.value||'').trim();
  const asRule=document.getElementById('dr-'+id)?.checked;
  const sev=document.getElementById('ds-'+id)?.value||'🟡';
  const p=DOCS.find(x=>x.id===id)||{};
  // "ให้แก้" = rework loop: ต้องมีคอมเมนต์บอก agent ว่าจะแก้อะไร
  if (status==='revise' && !comment) { toast('พิมพ์บอกก่อนว่าให้แก้อะไร แล้วค่อยกดให้แก้ 🔁', '#fbbf24'); document.getElementById('dc-'+id)?.focus(); return; }
  delete drafts[id];
  try {
    if (status==='revise') {
      // dispatch a rework task the Mac-mini executor will pick up → gen ใหม่ทับใบเดิม → กลับมา pending
      const round=(p.rework_round||0)+1;
      const task=[
        'Rework practice poster ที่ Champ กดให้แก้ ตาม ~/Projects/poster-dojo/PRACTICE.md (section REWORK).',
        `Poster: ${p.name||id}  (ไฟล์เดิม: practice/${p.name||id}.html)  ·  รอบแก้ที่ ${round}`,
        `คอมเมนต์ Champ (สิ่งที่ต้องแก้): "${comment}"`,
        'ทำ: อ่าน practice/<name>.html + RUBRIC.md → แก้เฉพาะจุดที่ Champ บอก (อย่ารื้อทั้งใบ ถ้าจุดอื่นดีอยู่แล้ว) → bash render.sh → self-review เทียบ RUBRIC → push ทับใบเดิม (FIREBASE_KEY_PATH=~/Projects/up-level-leaderboard/service-account.json node firestore-sync.mjs push practice/<name>.png, ใช้ node LTS) → จากนั้น set doc poster-dojo/<name> field status="pending" (merge) เพื่อให้กลับมาให้ Champ ตรวจรอบใหม่. ทำ autonomous.',
      ].join('\n');
      await addDoc(collection(db,'claude-tasks'), {
        task, project:'poster-dojo', status:'pending', source:'rework',
        posterId:id, posterName:p.name||id, champ_comment:comment, rework_round:round,
        created_by:ME, created_at:serverTimestamp(),
      });
      // mark the poster "reworking" so it leaves the review queue until the new render lands
      await updateDoc(doc(db,'poster-dojo',id), {
        status:'reworking', champ_comment:comment, reviewed_by:ME, reviewed_at:serverTimestamp(),
        rework_round:round, rework_dispatched_at:serverTimestamp(),
      });
    } else {
      await updateDoc(doc(db,'poster-dojo',id), { status, champ_comment:comment||null, reviewed_by:ME, reviewed_at:serverTimestamp() });
    }
    if (asRule && comment) {
      await addDoc(collection(db,'poster-rubric'), { rule:comment, severity:sev, fromPoster:p.name||id, game:p.game||null, applied:false, by:ME, created_at:serverTimestamp() });
      toast('เพิ่มกฎเข้า RUBRIC + '+(status==='revise'?'ส่งให้แก้แล้ว 🔧':'บันทึกแล้ว ✓'));
    } else toast(status==='approved'?'ผ่านแล้ว ✅':'ส่งให้ agent แก้แล้ว 🔧 — เดี๋ยวกลับมาให้ตรวจใหม่');
  } catch(e){ toast('error: '+(e.code||e.message), '#f87171'); }
};
</script>
</body>
</html>
